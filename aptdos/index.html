<!DOCTYPE html>
<html>
<head>
    <title>Un Hogar Temporal</title>
    <link rel="stylesheet" type="text/css" href="styles/aesthetwo.css">
    <link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/061/905/322/small/a-pixel-art-image-of-purple-flowers-png.png" type="image/png"/>

        <!-- adding the code below so that the font also shows upp on safari -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
    <h1>el segundo hogar</h1>

    <div class="floor-plan-container">
        <svg width="618" height="768" viewbox="0 0 611 768" 
        fill="none" xmlns="http://wwww.w3.org/2000/svg"> <!-- xmlns = XML namespace -->
        <!-- these are the main rooms -->
        <rect id="apartment-two" x="1" y="4" width="602" height="752" fill="white"
        stroke="#A1E1FC" stroke-width="2"/>
        <rect id="bedroom-one" class="room" x="1" y="4" width="302" height="266" fill="#F5F5F5"
        stroke="#A1E1FC" stroke-width="2"/>
        <rect id="bedroom-two" class="room" x="301" y="4" width="302" height="350" fill="#F5F5F5"
        stroke="#A1E1FC" stroke-width="2"/>
        <rect id="kitchen" class="room" x="301" y="353" width="302" height="204" fill="#F5F5F5"
        stroke="#A1E1FC" stroke-width="2"/>
        <rect id="bathroom" class="room" x="1" y="270" width="136" height="204" fill="#F5F5F5"
        stroke="#A1E1FC" stroke-width="2"/>
        <!-- big merged shape area begins -->
        <mask id="path-6-inside-1_2004_41" fill="white">
            <path d="M302 554H604V757H134V554H136V269H302V554Z"/>
        </mask>
        <path id="living-room" class="room" d="M302 554H604V757H134V554H136V269H302V554Z" fill="#F5F5F5"/>
        <path d="M302 554H300V556H302V554ZM604 554H606V552H604V554ZM604 757V759H606V757H604ZM134 757H132V759H134V757ZM134 
        554V552H132V554H134ZM136 554V556H138V554H136ZM136 269V267H134V269H136ZM302 269H304V267H302V269ZM302 554V556H604V554V552H302V554ZM604 
        554H602V757H604H606V554H604ZM604 757V755H134V757V759H604V757ZM134 757H136V554H134H132V757H134ZM134 554V556H136V554V552H134V554ZM136 
        554H138V269H136H134V554H136ZM136 269V271H302V269V267H136V269ZM302 269H300V554H302H304V269H302Z" 
        fill="#A1E1FC" mask="url(#path-6-inside-1_2004_41)"/>
        <!-- big merge shape area ends -->
        <rect id="foyer" class="room" x="1" y="472" width="136" height="94" fill="#F5F5F5"
        stroke="#A1E1FC" stroke-width="2"/>
        <rect id="bedroom-three" class="room" x="1" y="564" width="136" height="192" fill="#F5F5F5"
        stroke="#A1E1FC" stroke-width="2"/> <!-- the room that became something else -->

          <!-- these will be windows and doors-->
            <!-- doors -->
            <line id="bdrmone-door" x1="177" y1="270" x2="255" y2="270" stroke="#006A99" stroke-width="8" stroke-linecap="round"/>
            <line id="bdrmtwo-door" x1="302" y1="278" x2="302" y2="332" stroke="#54CCFF" stroke-width="8" stroke-linecap="round"/>
            <line id="bathroom-door" x1="136" y1="392" x2="136" y2="446" stroke="#54CCFF" stroke-width="8" stroke-linecap="round"/>
            <line id="bdrmthree-door" x1="137" y1="589" x2="137" y2="643" stroke="#54CCFF" stroke-width="8" stroke-linecap="round"/>
            <line id="front-door" x1="1" y1="488" x2="1" y2="543" stroke="#54CCFF" stroke-width="8" stroke-linecap="round"/>
            
            <!-- doorways -->
            <line id="foyer-doorway" x1="136" y1="488" x2="136" y2="543" stroke="#54CCFF" stroke-width="8" stroke-linecap="round"/>
            <line id="kitchen-doorway" x1="302" y1="412" x2="302" y2="498" stroke="#54CCFF" stroke-width="8" stroke-linecap="round"/>

            <!-- windows -->
            <line id="bdrmone-window" x1="110" y1="5" x2="199" y2="5" stroke="#00B3FF" stroke-width="8" stroke-linecap="square"/>
            <line id="bdrmtwo-window" x1="416" y1="4" x2="505" y2="4" stroke="#00B3FF" stroke-width="8" stroke-linecap="square"/>
            <line id="kitchen-window" x1="603" y1="407" x2="603" y2="492" stroke="#00B3FF" stroke-width="8" stroke-linecap="square"/>
            <line id="livingroom-windowone" x1="241" y1="756" x2="330" y2="756" stroke="#00B3FF" stroke-width="8" stroke-linecap="square"/>
            <line id="livingroom-windowtwo" x1="441" y1="756" x2="530" y2="756" stroke="#00B3FF" stroke-width="8" stroke-linecap="square"/>
        </svg>
    </div>

    <!-- overlay, for when the notebook is clicked, there is a darkening in the background -->
     <div class="overlay" id="overlay"></div>

    <!-- notebook popup...still need to build the pixel asset -->
     <div class="notebook" id="notebook">
        <div class="red-margin"></div>
        <button class="close-button" id="close-button">x</button>
        <h2 id="notebook-title">room</h2>
        <p id="notebook-text">...</p>
     </div>

     <div class="door-note" id="door-note">
        <div class="note-tape"></div>
        <div class="note-content">
            <p class="note-text">are you sure you wish to proceed?</p>
            <p class="note-subtext">there is no turning back until you've reached the end.</p>
            <div class="note-buttons">
                <button class="note-button yes-button" id="note-yes">yes.</button>
                <button class="note-button no-button" id="note-no">no.</button>
            </div>
        </div>
     </div>

     <div class="door-transition" id="door-transition">
        <div class="pixel-door"></div>
     </div>

          <!-- bathroom mirror -->
     <div id="mirror-overlay">
        <div id="mirror">
            <p class="mirror-prompt">leave a message.</p>
            <div id="mirror-message"></div>
            <input id="mirror-input" type="text" placeholder="leave a wish in the steam..." maxlength="80" autocomplete="off" spellcheck="false" />
            <button id="mirror-submit">leave it</button>
            <button id="mirror-close">wipe away</button>
        </div>
     </div>

      <!-- sorta magical closet -->
     <div id="closet-overlay">
        <div id="closet">
            <p class="closet-prompt">would you mind leaving something behind?</p>
            <div id="closet-wall">
                <div id="closet-text"></div>
            </div>
            <input id="closet-input" type="text" placeholder="write a secret on the wall..." maxlength="80" autocomplete="off" spellcheck="false" />
            <button id="closet-submit">let it go</button>
            <button id="closet-close">hold it close</button>
        </div>
     </div>

     <div id="crumble-pile"></div>

     <body class="apt-two"></body>

    <script id="cursor" src="cursorworkaround/key.js"></script>
    <script id="mainjava" src="java/main.js"></script>
</body>
</html>
